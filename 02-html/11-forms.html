<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11-formularios</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg class="SVGBGI" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path class="accent" d="M12 20V4l-8 8 8 8z"></path><path class="outline" d="m2.29,12.71l8,8c.39.39,1.02.39,1.41,0s.39-1.02,0-1.41l-6.29-6.29h15.59c.55,0,1-.45,1-1s-.45-1-1-1H5.41l6.29-6.29c.39-.39.39-1.02,0-1.41-.2-.2-.45-.29-.71-.29s-.51.1-.71.29L2.29,11.29c-.39.39-.39,1.02,0,1.41Z"></path><path class="solid" d="m1.58 13.42 8 8a2 2 0 0 0 2.83-2.83L7.82 14h13.17c1.1 0 2-.9 2-2s-.9-2-2-2H7.83l4.59-4.59a2 2 0 0 0-1.41-3.42 2 2 0 0 0-1.41.59l-8.02 8a2.01 2.01 0 0 0 0 2.83Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>11-formularios</h1>
            <h2>Crea formularios interactivos para entradas de usuario.</h2>
        </header>
        <section>
            <form action="#" method="post">
                <label for="name">Nombre:</label>
                <input id="name" type="text" name="name" required>

                <label for="email">Correo:</label>
                <input id="email" type="email" name="email" required>

                <label for="course">Curso:</label>
                <select id="course" name="course">
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="js">JavaScript</option>
                </select>

                <p>Nivel:</p>
                <label><input type="radio" name="level" value="basic"> Básico</label>
                <label><input type="radio" name="level" value="intermediate"> Intermedio</label>
                <label><input type="radio" name="level" value="advanced"> Avanzado</label>

                <label for="message">Mensaje:</label>
                <textarea id="message" name="message" rows="4"></textarea>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
</body>
</html>
