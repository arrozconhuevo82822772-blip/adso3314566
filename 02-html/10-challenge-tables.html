<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-reto-tablas</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
    <style>
        .challenge-grid {
            width: 100%;
            max-width: 980px;
            border-collapse: collapse;
            background-color: #2f2f31;
            color: #fff;
            table-layout: fixed;
        }

        .challenge-grid td {
            border: 3px solid #f0f0f0;
            height: 62px;
            text-align: center;
            vertical-align: middle;
            font-size: 2rem;
            font-family: Arial, Helvetica, sans-serif;
        }

        .challenge-grid .fill {
            background-color: #06080d;
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg class="SVGBGI" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path class="accent" d="M12 20V4l-8 8 8 8z"></path><path class="outline" d="m2.29,12.71l8,8c.39.39,1.02.39,1.41,0s.39-1.02,0-1.41l-6.29-6.29h15.59c.55,0,1-.45,1-1s-.45-1-1-1H5.41l6.29-6.29c.39-.39.39-1.02,0-1.41-.2-.2-.45-.29-.71-.29s-.51.1-.71.29L2.29,11.29c-.39.39-.39,1.02,0,1.41Z"></path><path class="solid" d="m1.58 13.42 8 8a2 2 0 0 0 2.83-2.83L7.82 14h13.17c1.1 0 2-.9 2-2s-.9-2-2-2H7.83l4.59-4.59a2 2 0 0 0-1.41-3.42 2 2 0 0 0-1.41.59l-8.02 8a2.01 2.01 0 0 0 0 2.83Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>10-reto-tablas</h1>
            <h2>Practica la creación y estructura de tablas.</h2>
        </header>
        <section>
            <table class="challenge-grid">
                <tbody>
                    <tr>
                        <td colspan="5"></td>
                        <td class="fill">😎</td>
                        <td colspan="3"></td>
                    </tr>
                    <tr>
                        <td colspan="4"></td>
                        <td class="fill">😎</td>
                        <td class="fill" rowspan="2">😎</td>
                        <td class="fill">😎</td>
                        <td colspan="2"></td>
                    </tr>
                    <tr>
                        <td colspan="3"></td>
                        <td class="fill">😎</td>
                        <td></td>
                        <td class="fill">😎</td>
                        <td colspan="2"></td>
                    </tr>
                    <tr>
                        <td colspan="2"></td>
                        <td class="fill">😎</td>
                        <td class="fill" colspan="3">😎</td>
                        <td class="fill">😎</td>
                        <td colspan="2"></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td class="fill">😎</td>
                        <td colspan="5" class="fill">😎</td>
                        <td class="fill">😎</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td colspan="2"></td>
                        <td class="fill">😎</td>
                        <td class="fill" colspan="3">😎</td>
                        <td class="fill">😎</td>
                        <td colspan="2"></td>
                    </tr>
                    <tr>
                        <td colspan="3"></td>
                        <td class="fill">😎</td>
                        <td></td>
                        <td class="fill">😎</td>
                        <td colspan="3"></td>
                    </tr>
                    <tr>
                        <td colspan="4"></td>
                        <td class="fill">😎</td>
                        <td class="fill">😎</td>
                        <td class="fill">😎</td>
                        <td colspan="2"></td>
                    </tr>
                    <tr>
                        <td colspan="5"></td>
                        <td class="fill">😎</td>
                        <td colspan="3"></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
