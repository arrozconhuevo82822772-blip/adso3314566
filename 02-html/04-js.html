        <header>
            <h1>04 - JavaScript</h1>
            <h2>Inserta codigo en JavaScript.</h2>
        </header>
        <section>
            <h3>JavaScript:</h3>
            <h4 class="user"></h4>
        </section>
        <script>
            const user = document.querySelector('.user');
            const answer = prompt("What's your name?");
            if (answer && answer.trim()) {
                user.textContent = 'Welcome: ' + answer.trim();
            } else {
                user.textContent = 'Welcome: Guest!';
            }
        </script>
